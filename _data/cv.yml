        location: San Francisco Bay Area, USA
        start_date: 2024-03
        end_date: 2026-02
        highlights:
          - Tech Lead on Mobile Manipulation Robotics Team.
          - Spearheaded development of high-impact control features, doubling throughput in Q4 2023, which proved crucial for commercial success and fundraising.
          - Diagnosed and resolved critical production issues involving mobile robot dynamics slip and sensing noise across heterogeneous robot fleets.
          - Designed simulation and data analytics tools to benchmark and improve locomotion reliability and multi-sensor integration.

      - company: Nimble.ai
