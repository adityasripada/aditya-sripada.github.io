        location: San Francisco Bay Area, USA
        start_date: 2022-10
        end_date: 2024-03

      - company: Nimble.ai
        position: Robotics Engineer
        location: San Francisco Bay Area, USA
        start_date: 2021-09
        end_date: 2022-09
        highlights:
          - First robotics engineer on the flagship robotic system, responsible for item picking and autonomous warehouse navigation.

      - company: Carnegie Mellon University Robotics Institute
        position: Graduate Student Researcher
        location: Pittsburgh, PA, USA
        start_date: 2019-09
        end_date: 2021-08
        summary: "Advisor: Prof. Hartmut Geyer"
        highlights:
          - Worked on optimal control of highly non-linear, dynamic, and underactuated legged systems, including the ATRIAS biped.
          - Focused on exploiting natural dynamics of legged systems to achieve dynamic maneuvers with minimal energy expenditure.

      - company: Carnegie Mellon University
        position: "State Estimation & Localization, CMU Moon Rover"
        location: Pittsburgh, PA, USA
        start_date: 2020-08
        end_date: 2021-01
        summary: Part-time project
        highlights:
          - Developed robust state estimator for localization of the CMU Moonranger autonomous space rover, targeting the Lunar South Pole.
          - Developed vehicle kinematics models and probabilistic filters for localization.
          - Designed power switching circuitry to mitigate single event upsets caused by ionizing radiation in space.

      - company: Indian Institute of Technology, Hyderabad
        position: Research Engineer, Robotics and Intelligent Systems Laboratory
        location: Hyderabad, India
        start_date: 2018-02
        end_date: 2019-05
        summary: "Advisor: Prof. R. Prasanth Kumar"
        highlights:
          - Engineered a full-sized humanoid robot (1.72m) from scratch with a budget of INR 7M (USD 100K).
          - Developed controllers for walking, active balance, push recovery, and vertical jumping.
          - Built a flying biped combining terrain capabilities of a biped with aerial capabilities of a quadrotor (presented at IROS 2018).
          - Designed novel footplates for prostheses and orthoses enhancing lateral stability (patented).
          - Implemented micron-level precision control on a five-bar parallel manipulator.

      - company: LVPEI Center for Innovation
        position: LVP-MIT Research Fellow
        location: Hyderabad, India
        start_date: 2017-06
        end_date: 2017-12
        summary: Research collaboration between LVPEI Center for Innovation and MIT Media Lab
        highlights:
          - Gaze tracking of infants to quantify response to changing light stimuli without subjectivity.
          - Developed hardware system for Pupil+, a handheld device to quantify pupillary and neurological responses to light stimuli.
          - Developed an inexpensive, multifunctional device to diagnose Dry Eye Syndrome.
          - Technical mentor at the 5th and 6th editions of "Engineering the Eye" Hackathon; mentored teams placed 1st runner-up both years.

      - company: SRM Team Humanoid, SRM University
        position: Team Lead
        location: Chennai, India
        start_date: 2013
        end_date: 2017
        summary: "Advisor: Prof. Hemalatha B"
        highlights:
          - Led design, fabrication, and control of humanoid robots for international competitions.
          - Won India's first Gold Medal at Robogames 2017 in the Autonomous Humanoid Penalty Kick category.

